name: git-helper-ai-mcp
description: MEOK AI Labs MCP Server
version: 1.0.0
tools:
- name: parse_diff
  description: Parse a unified diff and extract structured change information.
  parameters:
  - name: diff_text
    type: string
    required: true
- name: generate_commit_message
  description: 'Generate a commit message from a diff. Styles: conventional, simple,
    detailed.'
  parameters:
  - name: diff_text
    type: string
    required: true
  - name: style
    type: string
    required: false
- name: analyze_branch
  description: 'Analyze git log output. Expects format: hash|author|date|message (one
    per line).'
  parameters:
  - name: log_text
    type: string
    required: true
- name: changelog_generator
  description: 'Generate a changelog from git log. Expects: hash|author|date|message
    per line.'
  parameters:
  - name: log_text
    type: string
    required: true
  - name: version
    type: string
    required: false
